<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Iniciar Sesión</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <h2>BIENVENIDO</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Ingresa tu contraseña" required>
            </div>
            
            <div class="input-group" style="background: #f9f9f9; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <input type="checkbox" id="robotCheck" required style="width: auto;">
                <label for="robotCheck"> No soy un robot</label>
            </div>

            <button type="submit" class="btn-submit">Iniciar sesión</button>
        </form>

        <div class="auth-links">
            <a href="registro.html">No tienes cuenta, crea una</a>
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
