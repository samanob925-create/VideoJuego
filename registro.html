<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate - GameHub</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- reCAPTCHA v2 -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2>Crear cuenta</h2>
            <p class="auth-subtitle">Completa los campos para registrarte</p>

            <form id="registroForm">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="regNombre" placeholder="Nombre de usuario" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="regEmail" placeholder="Correo electrónico" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="regPassword" placeholder="Contraseña (mín. 6 caracteres)" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-check-circle input-icon"></i>
                    <input type="password" id="regConfirm" placeholder="Confirmar contraseña" required>
                </div>

                <!-- reCAPTCHA real -->
                <div class="input-group recaptcha-group">
                    <div class="g-recaptcha" data-sitekey="TU_SITE_KEY_AQUI"></div>
                    <!-- Reemplaza TU_SITE_KEY_AQUI con tu clave de sitio de Google reCAPTCHA -->
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-check"></i> Registrarse
                </button>
            </form>

            <p class="auth-terms">Al registrarte aceptas nuestros Términos y Política de privacidad</p>

            <div class="auth-links" style="justify-content: center;">
                <a href="index.html"><i class="fas fa-sign-in-alt"></i> ¿Ya tienes cuenta? Inicia sesión</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
